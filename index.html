<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Héroe Daily Flow</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;height:100%">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;


const STORAGE_KEY = "heroedailyflow-v1";
const USER_KEY    = "heroedailyflow-user-v1";
const MONTHS_ES   = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const DAYS_ES     = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
const CAL_DAYS    = ["D","L","M","X","J","V","S"];
const COLS = [
  { id:"todo",  label:"Por Hacer", col:"#2563EB", bg:"rgba(37,99,235,0.12)",  dot:"#2563EB" },
  { id:"doing", label:"Haciendo",  col:"#D97706", bg:"rgba(217,119,6,0.12)",  dot:"#D97706" },
  { id:"done",  label:"Hecho",     col:"#059669", bg:"rgba(5,150,105,0.12)",  dot:"#059669" },
];
const PRIO = {
  high:   { label:"Alta",  color:"#DC2626", bg:"rgba(220,38,38,0.12)",   border:"rgba(220,38,38,0.4)"   },
  medium: { label:"Media", color:"#D97706", bg:"rgba(217,119,6,0.12)",   border:"rgba(217,119,6,0.4)"   },
  low:    { label:"Baja",  color:"#059669", bg:"rgba(5,150,105,0.12)",   border:"rgba(5,150,105,0.4)"  },
};
const uid      = () => Math.random().toString(36).substr(2,9);
const todayStr = () => new Date().toISOString().split("T")[0];
const fmtDate  = s => { if(!s) return ""; const [y,m,d]=s.split("-"); return `${d}/${m}/${y}`; };
const dateES   = () => { const d=new Date(); return `${DAYS_ES[d.getDay()]}, ${d.getDate()} de ${MONTHS_ES[d.getMonth()]}`; };

const LOGO = "";
const Logo = ({ size=42 }) => (
  <div style={{width:size,height:size,borderRadius:"50%",
    background:"linear-gradient(135deg,#1E3A8A,#7C3AED)",
    display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
    boxShadow:"0 2px 16px rgba(30,58,138,.4)",border:"2px solid rgba(255,215,0,.5)"}}>
    <svg width={size*0.65} height={size*0.65} viewBox="0 0 40 46" fill="none">
      <path d="M20 2L36 8V22C36 32 28.5 40 20 44C11.5 40 4 32 4 22V8L20 2Z"
        fill="rgba(255,215,0,.2)" stroke="#FFD700" strokeWidth="1.5"/>
      <polygon points="20,11 22.5,18 30,18 24,22.5 26.5,30 20,25.5 13.5,30 16,22.5 10,18 17.5,18"
        fill="#FFD700"/>
    </svg>
  </div>
);

const beep = () => {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0,.18],[880,.24,.18],[1100,.48,.3],[880,.84,.18],[1100,1.1,.38]].forEach(([f,s,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);o.frequency.value=f;
      g.gain.setValueAtTime(0,ctx.currentTime+s);
      g.gain.linearRampToValueAtTime(.5,ctx.currentTime+s+.06);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+s+d);
      o.start(ctx.currentTime+s);o.stop(ctx.currentTime+s+d+.1);
    });
  }catch(e){}
};

/* ── SPLASH ── */
const Splash = ({ onDone }) => {
  const [bar, setBar] = useState(0);
  useEffect(()=>{
    const iv=setInterval(()=>setBar(b=>{ if(b>=100){clearInterval(iv);onDone();return 100;} return b+2; }),60);
    return ()=>clearInterval(iv);
  },[]);
  return (
    <div style={{position:"fixed",inset:0,zIndex:999,
      background:"linear-gradient(145deg,#1E3A8A,#2D1B69,#1E3A5F)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:18}}>
      <div style={{position:"relative",width:140,height:140,display:"flex",alignItems:"center",justifyContent:"center"}}>
        {[0,1,2].map(i=>(
          <div key={i} style={{position:"absolute",borderRadius:"50%",
            border:`1px solid rgba(255,215,0,${.3-i*.08})`,
            width:90+i*28,height:90+i*28,
            animation:`rp 2s ${i*.35}s ease-in-out infinite`}}/>
        ))}
        <div style={{animation:"lb 2s ease-in-out infinite"}}><Logo size={110}/></div>
      </div>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:9,color:"rgba(255,215,0,.8)",letterSpacing:"4px",fontFamily:"'Cinzel',serif",marginBottom:5,textTransform:"uppercase"}}>PROYECTO HÉROE</div>
        <div style={{fontSize:22,fontWeight:900,fontFamily:"'Cinzel',serif",color:"#FFFFFF",letterSpacing:"1px"}}>
          Héroe Daily Flow
        </div>
      </div>
      <div style={{width:180,height:4,background:"rgba(255,255,255,.2)",borderRadius:4,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${bar}%`,transition:"width .1s",
          background:"linear-gradient(90deg,#F59E0B,#FFFFFF,#60A5FA)",borderRadius:4}}/>
      </div>

    </div>
  );
};

/* ── MINI CALENDAR ── */
const MiniCalendar = ({ tasks, onFilterDate, filterDate }) => {
  const [calDate, setCalDate] = useState(new Date());
  const yr = calDate.getFullYear();
  const mo = calDate.getMonth();
  const firstDay = new Date(yr, mo, 1).getDay();
  const daysInMo = new Date(yr, mo+1, 0).getDate();
  const today = todayStr();

  const getTasksForDay = (d) => {
    const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    return tasks.filter(t => t.date === ds);
  };

  return (
    <div style={{background:"rgba(255,255,255,.12)",borderRadius:14,padding:"10px 12px",
      border:"1px solid rgba(255,255,255,.2)"}}>
      {/* Cal header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <button onClick={()=>setCalDate(new Date(yr,mo-1))}
          style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:7,
            width:26,height:26,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>‹</button>
        <div style={{fontSize:12,fontWeight:700,color:"#FFD700",fontFamily:"'Cinzel',serif",textTransform:"capitalize"}}>
          {MONTHS_ES[mo].charAt(0).toUpperCase()+MONTHS_ES[mo].slice(1)} {yr}
        </div>
        <button onClick={()=>setCalDate(new Date(yr,mo+1))}
          style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:7,
            width:26,height:26,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>›</button>
      </div>
      {/* Day names */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {CAL_DAYS.map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:9,color:"rgba(255,255,255,.5)",fontWeight:700}}>{d}</div>
        ))}
      </div>
      {/* Days */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
        {Array.from({length:daysInMo},(_,i)=>{
          const d = i+1;
          const ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const dt = getTasksForDay(d);
          const isToday = ds === today;
          const isSel   = ds === filterDate;
          return (
            <div key={d} onClick={()=>onFilterDate(isSel?null:ds)}
              style={{
                aspectRatio:"1",display:"flex",flexDirection:"column",
                alignItems:"center",justifyContent:"center",
                borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:isToday?800:500,
                color: isSel?"#0F0C1E":isToday?"#FFD700":"rgba(255,255,255,.85)",
                background: isSel?"#FFD700":isToday?"rgba(255,215,0,.2)":"transparent",
                position:"relative",transition:"all .15s"
              }}>
              {d}
              {dt.length>0 && (
                <div style={{display:"flex",gap:1.5,position:"absolute",bottom:2}}>
                  {dt.slice(0,3).map((t,i)=>(
                    <div key={i} style={{width:3.5,height:3.5,borderRadius:"50%",
                      background:t.status==="done"?"#059669":t.status==="doing"?"#D97706":"#2563EB"}}/>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {filterDate && (
        <button onClick={()=>onFilterDate(null)}
          style={{marginTop:8,width:"100%",padding:"5px",background:"rgba(220,38,38,.15)",
            border:"1px solid rgba(220,38,38,.3)",borderRadius:8,color:"#FCA5A5",
            fontSize:11,fontWeight:600,cursor:"pointer"}}>
          ✕ Ver todas las tareas
        </button>
      )}
    </div>
  );
};

/* ════════ APP ════════ */
function App() {
  const [splash,     setSplash]     = useState(true);
  const [userName,   setUserName]   = useState("");
  const [showName,   setShowName]   = useState(false);
  const [nameInput,  setNameInput]  = useState("");
  const [tasks,      setTasks]      = useState([]);
  const [modal,      setModal]      = useState(false);
  const [editTask,   setEditTask]   = useState(null);
  const [dragId,     setDragId]     = useState(null);
  const [dragOver,   setDragOver]   = useState(null);
  const [listening,  setListening]  = useState(false);
  const [transcript, setTranscript] = useState("");
  const [parsing,    setParsing]    = useState(false);
  const [parsed,     setParsed]     = useState(null);
  const [alarm,      setAlarm]      = useState(null);
  const [genPh,      setGenPh]      = useState(false);
  const [vErr,       setVErr]       = useState("");
  const [filterDate, setFilterDate] = useState(null);
  const [showCal,    setShowCal]    = useState(false);
  const [form, setForm] = useState({title:"",description:"",date:todayStr(),time:"",priority:"medium",tags:"",phrase:"",status:"todo"});
  const aRefs=useRef({}); const rRef=useRef(null);

  useEffect(()=>{
    (async()=>{
      try{
        const ur=JSON.parse(localStorage.getItem(USER_KEY)||"null");
        const un=ur?JSON.parse(ur.value):"";
        if(un) setUserName(un); else setShowName(true);
        const tr=JSON.parse(localStorage.getItem(STORAGE_KEY)||"null");
        if(tr) setTasks(JSON.parse(tr.value));
      }catch{ setShowName(true); }
    })();
  },[]);

  const saveName=async()=>{
    if(!nameInput.trim()) return;
    setUserName(nameInput.trim());
    try{ localStorage.setItem(USER_KEY,JSON.stringify(nameInput.trim())); }catch{}
    setShowName(false);
  };
  const saveTasks=async n=>{ setTasks(n); try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(n)); }catch{}};
  const schedule = (task) => {
    // Clear existing timer for this task
    if (aRefs.current[task.id]) {
      clearTimeout(aRefs.current[task.id]);
      delete aRefs.current[task.id];
    }
    if (!task.time || !task.date || task.status === "done") return;

    // Parse date manually to avoid timezone issues
    const [yr, mo, dy] = task.date.split("-").map(Number);
    const [hh, mm]     = task.time.split(":").map(Number);
    const taskTime     = new Date(yr, mo - 1, dy, hh, mm, 0, 0);
    const delay        = taskTime.getTime() - Date.now();

    if (delay > 0 && delay < 8 * 24 * 3600 * 1000) {
      aRefs.current[task.id] = setTimeout(() => {
        setAlarm(task);
        beep();
        // Try browser notification too
        if (typeof Notification !== "undefined" && Notification.permission === "granted") {
          new Notification("⏰ " + task.title, {
            body: task.description || "Es la hora de tu tarea",
            icon: "/favicon.ico"
          });
        }
      }, delay);
    }
  };

  // Schedule alarms whenever tasks change
  useEffect(() => {
    tasks.forEach(schedule);
    // Request notification permission on first load
    if (typeof Notification !== "undefined" && Notification.permission === "default") {
      Notification.requestPermission();
    }
    return () => {
      Object.values(aRefs.current).forEach(clearTimeout);
    };
  }, [tasks]);

  const startMic=async()=>{
    setVErr("");
    if(navigator.mediaDevices?.getUserMedia){
      try{ const s=await navigator.mediaDevices.getUserMedia({audio:true}); s.getTracks().forEach(t=>t.stop()); }
      catch(e){ setVErr(e.name==="NotAllowedError"?"🔒 Permití el micrófono en tu navegador.":"Sin micrófono."); return; }
    }
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){ setVErr("Usá Chrome o Safari para voz."); return; }
    const r=new SR(); r.lang="es-ES"; r.interimResults=true;
    r.onstart=()=>{setListening(true);setTranscript("");setParsed(null);};
    r.onresult=e=>{const t=Array.from(e.results).map(x=>x[0].transcript).join("");setTranscript(t);if(e.results[e.results.length-1].isFinal)setListening(false);};
    r.onerror=ev=>{setListening(false);setVErr(ev.error==="not-allowed"?"🔒 Micrófono bloqueado.":ev.error==="no-speech"?"No se detectó voz.":"Error de micrófono.");};
    r.onend=()=>setListening(false); rRef.current=r;
    try{r.start();}catch{setListening(false);setVErr("No se pudo iniciar.");}
  };
  const stopMic=()=>{rRef.current?.stop();setListening(false);};

  const parseV=async tx=>{
    if(!tx.trim()) return; setParsing(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,
          messages:[{role:"user",content:`Tarea en español, SOLO JSON.\nTexto:"${tx}"\nHoy:${todayStr()}\n{"title":"","description":"","date":"YYYY-MM-DD","time":"HH:MM o vacío","priority":"high|medium|low"}`}]})});
      const d=await res.json();
      setParsed({id:uid(),tags:[],status:"todo",phrase:"",...JSON.parse(d.content?.[0]?.text?.trim().replace(/```json|```/g,"")||"{}")});
    }catch{setParsed({id:uid(),title:tx,description:"",date:todayStr(),time:"",priority:"medium",tags:[],status:"todo",phrase:""});}
    setParsing(false);
  };
  const confirm=()=>{if(!parsed)return;saveTasks([...tasks,parsed]);setTranscript("");setParsed(null);};
  const genPhrase=async()=>{
    setGenPh(true);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:120,messages:[{role:"user",content:`Frase motivadora 1-2 oraciones.${form.title?` Tarea:"${form.title}".`:""} Solo la frase.`}]})});
      const d=await r.json(); setForm(f=>({...f,phrase:d.content?.[0]?.text?.trim()||""}));
    }catch{} setGenPh(false);
  };

  const openAdd=(s="todo")=>{setEditTask(null);setForm({title:"",description:"",date:filterDate||todayStr(),time:"",priority:"medium",tags:"",phrase:"",status:s});setModal(true);};
  const openEdit=t=>{setEditTask(t);setForm({...t,tags:t.tags?.join(", ")||""});setModal(true);};
  const save=()=>{
    if(!form.title.trim()) return;
    const t={...form,tags:form.tags?form.tags.split(",").map(s=>s.trim()).filter(Boolean):[]};
    saveTasks(editTask?tasks.map(x=>x.id===editTask.id?{...x,...t}:x):[...tasks,{...t,id:uid()}]);
    setModal(false);
  };
  const del=id=>{saveTasks(tasks.filter(t=>t.id!==id));setModal(false);};
  const move=(id,s)=>saveTasks(tasks.map(t=>t.id===id?{...t,status:s}:t));
  const done=id=>{move(id,"done");setAlarm(null);};

  const visibleTasks = filterDate ? tasks.filter(t=>t.date===filterDate) : tasks;
  const L={fontSize:9,fontWeight:700,color:"#1E40AF",textTransform:"uppercase",letterSpacing:"1px",marginBottom:4,fontFamily:"'Cinzel',serif"};

  return (<>
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600;700&display=swap');
      *{margin:0;padding:0;box-sizing:border-box;}
      html,body{height:100%;overflow:hidden;background:#EEF2FF;font-family:'Raleway',sans-serif;color:#1E1B4B;}
      ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:#C7D2FE;border-radius:3px;}
      input,textarea{background:#fff;border:1.5px solid #C7D2FE;border-radius:9px;padding:8px 11px;color:#1E1B4B;font-family:'Raleway',sans-serif;font-size:12px;outline:none;width:100%;transition:all .2s;}
      input:focus,textarea:focus{border-color:#4F46E5;box-shadow:0 0 0 2px rgba(79,70,229,.12);}
      textarea{resize:none;line-height:1.4;}
      button{cursor:pointer;font-family:'Raleway',sans-serif;}
      @keyframes fi{from{opacity:0}to{opacity:1}}
      @keyframes su{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
      @keyframes pu{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.5)}70%{box-shadow:0 0 0 10px rgba(255,107,53,0)}}
      @keyframes rn{0%,100%{transform:rotate(0)}20%{transform:rotate(-14deg)}40%{transform:rotate(14deg)}60%{transform:rotate(-8deg)}80%{transform:rotate(8deg)}}
      @keyframes gp{0%,100%{color:#D97706}50%{color:#F59E0B}}
      @keyframes rp{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.5;transform:scale(1.05)}}
      @keyframes lb{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.04) translateY(-6px)}}
    `}</style>

    {splash && <Splash onDone={()=>setSplash(false)}/>}

    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"linear-gradient(160deg,#EEF2FF 0%,#E0E7FF 50%,#F0FDF4 100%)"}}>

      {/* HEADER */}
      <div style={{flexShrink:0,background:"linear-gradient(135deg,#1E3A8A,#2D1B69)",
        boxShadow:"0 2px 16px rgba(30,58,138,.3)"}}>
        <div style={{padding:"8px 12px",display:"flex",alignItems:"center",gap:10}}>
          <Logo size={40}/>
          <div style={{flex:1}}>
            <div style={{fontSize:7,fontFamily:"'Cinzel',serif",fontWeight:700,letterSpacing:"2px",color:"rgba(255,215,0,.75)",textTransform:"uppercase"}}>PROYECTO HÉROE</div>
            <div style={{fontSize:16,fontWeight:700,fontFamily:"'Cinzel',serif",color:"#FFFFFF",lineHeight:1.2}}>Héroe Daily Flow</div>
          </div>
          {userName && <div style={{fontSize:11,color:"#FCD34D",fontFamily:"'Cinzel',serif",animation:"gp 3s infinite",textAlign:"right"}}>
            Hola,<br/><strong>{userName}</strong>
          </div>}
          <button onClick={()=>openAdd()} style={{background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#fff",border:"none",borderRadius:10,padding:"7px 12px",fontSize:11,fontFamily:"'Cinzel',serif",fontWeight:700,letterSpacing:"1px",boxShadow:"0 3px 10px rgba(245,158,11,.4)"}}>+ Nueva</button>
        </div>

        {/* DATE + CALENDAR TOGGLE */}
        <div style={{padding:"0 12px 8px",display:"flex",alignItems:"center",gap:8}}>
          <div style={{flex:1,fontSize:11,color:"rgba(255,255,255,.75)",fontWeight:500,textTransform:"capitalize"}}>
            📅 {dateES()}
          </div>
          <button onClick={()=>setShowCal(s=>!s)} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.25)",borderRadius:8,padding:"4px 10px",color:"#FCD34D",fontSize:11,fontWeight:700,fontFamily:"'Cinzel',serif"}}>
            {showCal ? "▲ Ocultar" : "📆 Calendario"}
          </button>
          {filterDate && <button onClick={()=>setFilterDate(null)} style={{background:"rgba(220,38,38,.3)",border:"1px solid rgba(220,38,38,.4)",borderRadius:8,padding:"4px 8px",color:"#FCA5A5",fontSize:10,fontWeight:600}}>✕ Filtro</button>}
        </div>

        {/* CALENDAR (expandable) */}
        {showCal && (
          <div style={{padding:"0 12px 10px",animation:"fi .2s ease"}}>
            <MiniCalendar tasks={tasks} filterDate={filterDate} onFilterDate={setFilterDate}/>
          </div>
        )}
      </div>

      {/* BODY */}
      <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",padding:"8px 10px",gap:8,overflowY:"auto"}}>

        {/* VOICE */}
        <div style={{flexShrink:0,background:"#fff",borderRadius:14,padding:"10px 12px",
          boxShadow:"0 2px 12px rgba(79,70,229,.1)",border:"1px solid #E0E7FF"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,color:"#4F46E5",textTransform:"uppercase",fontFamily:"'Cinzel',serif",letterSpacing:"1px"}}>🎙 Asistente</span>
            <span style={{fontSize:10,color:"#94A3B8"}}>· Hablá o escribí</span>
          </div>
          {!parsed && (
            <div style={{position:"relative"}}>
              <textarea rows={2} placeholder={"Ej: Llamar a Juan a las 17:00 · Pagar la luz hoy"}
                value={transcript} onChange={e=>{setTranscript(e.target.value);setVErr("");}} style={{paddingRight:50}}/>
              <button onClick={listening?stopMic:startMic}
                style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",width:36,height:36,borderRadius:"50%",border:"none",
                  background:listening?"linear-gradient(135deg,#EF4444,#DC2626)":"linear-gradient(135deg,#4F46E5,#7C3AED)",
                  color:"#fff",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",
                  boxShadow:listening?"0 3px 10px rgba(239,68,68,.4)":"0 3px 10px rgba(79,70,229,.4)",
                  animation:listening?"pu 1.4s infinite":""}}>
                {listening?"⏹":"🎙"}
              </button>
            </div>
          )}
          {vErr && <div style={{background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:8,padding:"6px 10px",fontSize:11,color:"#92400E",fontWeight:600,marginTop:6}}>⚠️ {vErr}</div>}
          {transcript && !parsed && (
            <div style={{display:"flex",gap:7,marginTop:7}}>
              <button onClick={()=>{setTranscript("");setVErr("");}} style={{flex:1,padding:"7px",background:"#F1F5F9",border:"1.5px solid #E2E8F0",borderRadius:9,color:"#94A3B8",fontSize:12}}>✕</button>
              <button onClick={()=>parseV(transcript)} disabled={parsing} style={{flex:2,padding:"7px",background:"linear-gradient(135deg,#4F46E5,#7C3AED)",border:"none",borderRadius:9,color:"#fff",fontSize:12,fontWeight:700,opacity:parsing?.65:1,fontFamily:"'Cinzel',serif"}}>
                {parsing?"⏳ Analizando…":"✨ CREAR CON IA"}
              </button>
            </div>
          )}
          {parsed && (
            <div style={{marginTop:7,background:"#EEF2FF",borderRadius:12,padding:"10px",border:"1.5px solid #C7D2FE",animation:"su .25s ease"}}>
              <div style={{fontWeight:700,fontSize:13,color:"#1E1B4B",marginBottom:6}}>{parsed.title}</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
                {parsed.date && <span style={{fontSize:10,background:"#DBEAFE",color:"#1D4ED8",borderRadius:7,padding:"2px 7px",fontWeight:700}}>📅 {fmtDate(parsed.date)}</span>}
                {parsed.time && <span style={{fontSize:10,background:"#FEF3C7",color:"#92400E",borderRadius:7,padding:"2px 7px",fontWeight:700}}>⏰ {parsed.time}</span>}
                <span style={{fontSize:10,background:PRIO[parsed.priority]?.bg,color:PRIO[parsed.priority]?.color,borderRadius:7,padding:"2px 7px",fontWeight:700}}>{PRIO[parsed.priority]?.label}</span>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>{setParsed(null);setTranscript("");}} style={{flex:1,padding:"8px",background:"#F1F5F9",border:"1.5px solid #E2E8F0",borderRadius:9,color:"#94A3B8",fontSize:11}}>✕</button>
                <button onClick={confirm} style={{flex:2,padding:"8px",background:"linear-gradient(135deg,#059669,#047857)",border:"none",borderRadius:9,color:"#fff",fontSize:11,fontWeight:700,fontFamily:"'Cinzel',serif"}}>✓ AGENDAR</button>
              </div>
            </div>
          )}
          {!transcript && !parsed && !listening && (
            <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
              {["Llamar a Juan 17:00","Pagar la luz hoy","Reunión mañana 9:00"].map((ex,i)=>(
                <span key={i} onClick={()=>setTranscript(ex)} style={{fontSize:10,background:"#EEF2FF",color:"#4F46E5",borderRadius:7,padding:"3px 9px",fontWeight:600,cursor:"pointer",border:"1px solid #C7D2FE"}}>
                  {ex}
                </span>
              ))}
            </div>
          )}
        </div>

        {/* KANBAN */}
        <div style={{flex:1,minHeight:0,display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {COLS.map(col=>{
            const ct=visibleTasks.filter(t=>t.status===col.id);
            const iDO=dragOver===col.id;
            return (
              <div key={col.id} style={{display:"flex",flexDirection:"column",borderRadius:14,
                background:iDO?`${col.col}20`:"rgba(255,255,255,.7)",
                border:`1.5px solid ${iDO?col.col:"rgba(255,255,255,.9)"}`,overflow:"hidden",
                boxShadow:iDO?`0 0 0 2px ${col.col}40`:"0 2px 12px rgba(0,0,0,.06)",transition:"all .18s"}}
                onDragOver={e=>{ e.preventDefault();setDragOver(col.id);}}
                onDrop={e=>{ e.preventDefault();if(dragId)move(dragId,col.id);setDragId(null);setDragOver(null);}}
                onDragLeave={()=>setDragOver(null)}>
                <div style={{flexShrink:0,padding:"8px 10px",display:"flex",alignItems:"center",gap:7,
                  background:col.bg,borderBottom:`2px solid ${col.col}30`}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:col.col,boxShadow:`0 0 6px ${col.col}`}}/>
                  <div style={{flex:1,fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:".8px",color:col.dot,fontFamily:"'Cinzel',serif"}}>{col.label}</div>
                  <div style={{fontSize:11,fontWeight:800,background:"rgba(255,255,255,.8)",borderRadius:6,padding:"1px 7px",color:col.dot,border:`1px solid ${col.col}30`}}>{ct.length}</div>
                </div>
                <div style={{flex:1,overflowY:"auto",padding:"7px",display:"flex",flexDirection:"column",gap:6}}>
                  {ct.length===0 && <div style={{textAlign:"center",padding:"12px 0",color:`${col.col}60`,fontSize:11,fontStyle:"italic"}}>Sin tareas</div>}
                  {ct.map(t=>(
                    <div key={t.id} draggable
                      onDragStart={e=>{setDragId(t.id);e.dataTransfer.effectAllowed="move";}}
                      onDragEnd={()=>{setDragId(null);setDragOver(null);}}
                      style={{background:"#fff",borderRadius:11,padding:"9px 10px",
                        border:"1px solid #E2E8F0",borderLeft:`3px solid ${col.col}`,
                        cursor:"grab",opacity:dragId===t.id?.4:1,
                        boxShadow:"0 2px 8px rgba(0,0,0,.06)",transition:"all .15s",userSelect:"none"}}>
                      <span style={{fontSize:9,fontWeight:800,borderRadius:5,padding:"2px 6px",
                        background:PRIO[t.priority]?.bg,color:PRIO[t.priority]?.color,
                        border:`1px solid ${PRIO[t.priority]?.border}`}}>{PRIO[t.priority]?.label}</span>
                      <div onClick={()=>openEdit(t)} style={{fontWeight:700,fontSize:12,color:"#1E1B4B",margin:"5px 0 3px",cursor:"pointer",lineHeight:1.3}}>{t.title}</div>
                      {t.description && <div style={{fontSize:10,color:"#64748B",marginBottom:3,lineHeight:1.3,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{t.description}</div>}
                      {t.phrase && <div style={{fontSize:9,fontStyle:"italic",color:"#7C3AED",marginBottom:4,borderLeft:`2px solid ${col.col}50`,paddingLeft:6,lineHeight:1.3,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{t.phrase}</div>}
                      {t.date && <div style={{fontSize:10,color:"#94A3B8",fontWeight:600}}>📅 {fmtDate(t.date)}{t.time&&` ⏰ ${t.time}`}</div>}
                      {t.tags?.length>0 && (
                        <div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>
                          {t.tags.slice(0,2).map((tag,i)=><span key={i} style={{fontSize:9,background:col.bg,color:col.dot,borderRadius:5,padding:"1px 5px",fontWeight:700}}>{tag}</span>)}
                        </div>
                      )}
                    </div>
                  ))}
                  <button onClick={()=>openAdd(col.id)} style={{marginTop:"auto",padding:"6px",background:"transparent",border:`1.5px dashed ${col.col}40`,borderRadius:9,color:`${col.col}80`,fontSize:11,fontWeight:700,transition:"all .15s"}}>
                    + Agregar
                  </button>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{flexShrink:0,textAlign:"center",fontSize:8,color:"#94A3B8",letterSpacing:".8px",textTransform:"uppercase",paddingBottom:2}}>
          © Jorge Lami · Proyecto Héroe · Micro PowerApp ® {new Date().getFullYear()}
        </div>
      </div>
    </div>

    {/* MODAL TAREA */}
    {modal && (
      <div style={{position:"fixed",inset:0,background:"rgba(30,27,75,.5)",backdropFilter:"blur(8px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:12,animation:"fi .2s ease"}}
        onClick={e=>e.target===e.currentTarget&&setModal(false)}>
        <div style={{background:"#fff",border:"1px solid #E0E7FF",borderRadius:18,width:"100%",maxWidth:430,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 60px rgba(30,27,75,.2)",animation:"su .2s ease"}}>
          <div style={{padding:"16px 16px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontSize:15,fontWeight:800,color:"#1E1B4B",fontFamily:"'Cinzel',serif"}}>{editTask?"Editar":"Nueva tarea"}</div>
            <button onClick={()=>setModal(false)} style={{background:"#F1F5F9",border:"none",borderRadius:8,width:28,height:28,fontSize:14,color:"#64748B"}}>✕</button>
          </div>
          <div style={{padding:"12px 16px 16px",display:"flex",flexDirection:"column",gap:10}}>
            <div><div style={L}>Título *</div><input placeholder="¿Qué necesitás?" value={form.title} autoFocus onChange={e=>setForm(f=>({...f,title:e.target.value}))}/></div>
            <div><div style={L}>Descripción</div><textarea rows={2} placeholder="Detalles…" value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
              <div><div style={L}>Fecha</div><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}/></div>
              <div><div style={L}>⏰ Hora exacta</div><input type="time" value={form.time} onChange={e=>setForm(f=>({...f,time:e.target.value}))}/></div>
            </div>
            {form.time && <div style={{background:"#FEF3C7",border:"1px solid #FCD34D",borderRadius:9,padding:"6px 10px",fontSize:11,color:"#92400E",fontWeight:600}}>🔔 Alarma exacta a las {form.time}</div>}
            <div><div style={L}>Prioridad</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                {Object.entries(PRIO).map(([k,v])=>(
                  <button key={k} onClick={()=>setForm(f=>({...f,priority:k}))} style={{padding:"7px",borderRadius:9,fontWeight:700,fontSize:12,transition:"all .15s",border:`1.5px solid ${form.priority===k?v.color:"#E2E8F0"}`,background:form.priority===k?v.bg:"#F8FAFC",color:form.priority===k?v.color:"#94A3B8"}}>{v.label}</button>
                ))}
              </div>
            </div>
            <div><div style={L}>Columna</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6}}>
                {COLS.map(col=>(
                  <button key={col.id} onClick={()=>setForm(f=>({...f,status:col.id}))} style={{padding:"7px",borderRadius:9,fontWeight:700,fontSize:10,transition:"all .15s",border:`1.5px solid ${form.status===col.id?col.col:"#E2E8F0"}`,background:form.status===col.id?col.bg:"#F8FAFC",color:form.status===col.id?col.dot:"#94A3B8"}}>{col.label}</button>
                ))}
              </div>
            </div>
            <div><div style={L}>Etiquetas (coma)</div><input placeholder="trabajo, urgente…" value={form.tags} onChange={e=>setForm(f=>({...f,tags:e.target.value}))}/></div>
            <div><div style={L}>Frase motivadora</div>
              <div style={{position:"relative"}}>
                <textarea rows={2} placeholder="Escribí o generá con IA…" value={form.phrase} style={{paddingRight:66}} onChange={e=>setForm(f=>({...f,phrase:e.target.value}))}/>
                <button onClick={genPhrase} disabled={genPh} style={{position:"absolute",right:6,top:6,background:"linear-gradient(135deg,#4F46E5,#7C3AED)",border:"none",borderRadius:7,padding:"4px 8px",color:"#fff",fontSize:10,fontWeight:700,opacity:genPh?.5:1,fontFamily:"'Cinzel',serif"}}>
                  {genPh?"⏳":"✨"} IA
                </button>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:2}}>
              {editTask && <button onClick={()=>del(editTask.id)} style={{background:"#FEE2E2",color:"#DC2626",border:"1.5px solid #FECACA",borderRadius:11,padding:"10px 11px",fontSize:14}}>🗑</button>}
              <button onClick={save} disabled={!form.title.trim()} style={{flex:1,background:"linear-gradient(135deg,#1E3A8A,#2D1B69)",color:"#FCD34D",border:"none",borderRadius:13,padding:11,fontSize:13,fontWeight:800,opacity:form.title.trim()?1:.45,fontFamily:"'Cinzel',serif",letterSpacing:"1px"}}>
                {editTask?"GUARDAR":"CREAR TAREA"}
              </button>
            </div>
          </div>
        </div>
      </div>
    )}

    {/* ALARMA */}
    {alarm && (
      <div style={{position:"fixed",inset:0,background:"rgba(30,27,75,.6)",backdropFilter:"blur(12px)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16,animation:"fi .2s ease"}}>
        <div style={{background:"#fff",border:"2px solid #FCD34D",borderRadius:22,padding:"24px 20px",maxWidth:310,width:"100%",textAlign:"center",boxShadow:"0 24px 60px rgba(30,27,75,.3)",animation:"su .28s ease"}}>
          <div style={{fontSize:48,marginBottom:4,display:"inline-block",animation:"rn 1s ease infinite"}}>🔔</div>
          <div style={{fontSize:9,fontWeight:700,color:"#92400E",letterSpacing:"2px",textTransform:"uppercase",marginBottom:3,fontFamily:"'Cinzel',serif"}}>¡HORA DE TU TAREA!</div>
          {alarm.time && <div style={{fontSize:26,fontWeight:900,color:"#1D4ED8",marginBottom:4,fontFamily:"'Cinzel',serif"}}>⏱ {alarm.time}</div>}
          <div style={{fontSize:17,fontWeight:800,color:"#1E1B4B",marginBottom:5,lineHeight:1.3}}>{alarm.title}</div>
          {alarm.description && <div style={{fontSize:12,color:"#64748B",marginBottom:8,lineHeight:1.4}}>{alarm.description}</div>}
          {alarm.phrase && <div style={{fontSize:11,fontStyle:"italic",color:"#7C3AED",marginBottom:12,borderLeft:"2px solid #C4B5FD",paddingLeft:9,textAlign:"left",lineHeight:1.4}}>{alarm.phrase}</div>}
          <div style={{display:"flex",gap:9}}>
            <button onClick={()=>{setAlarm(null);setTimeout(()=>{setAlarm(alarm);beep();},5*60*1000);}} style={{flex:1,padding:"10px",background:"#F1F5F9",border:"1.5px solid #E2E8F0",borderRadius:13,color:"#64748B",fontWeight:700,fontSize:13}}>😴 5 min</button>
            <button onClick={()=>done(alarm.id)} style={{flex:1,padding:"10px",background:"linear-gradient(135deg,#059669,#047857)",border:"none",borderRadius:13,color:"#fff",fontWeight:800,fontSize:14,fontFamily:"'Cinzel',serif",letterSpacing:"1px"}}>✓ ¡HECHO!</button>
          </div>
        </div>
      </div>
    )}

    {/* NOMBRE */}
    {showName && (
      <div style={{position:"fixed",inset:0,background:"linear-gradient(145deg,#1E3A8A,#2D1B69)",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",animation:"fi .4s ease"}}>
        <div style={{filter:"drop-shadow(0 4px 16px rgba(0,0,0,.3))",marginBottom:14}}><Logo size={80}/></div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:9,color:"rgba(255,215,0,.75)",letterSpacing:"4px",textTransform:"uppercase",marginBottom:4}}>PROYECTO HÉROE</div>
        <div style={{fontFamily:"'Cinzel',serif",fontSize:22,fontWeight:900,color:"#FFFFFF",marginBottom:5,letterSpacing:"1px"}}>Héroe Daily Flow</div>
        <div style={{width:50,height:1.5,background:"linear-gradient(90deg,transparent,#FCD34D,transparent)",marginBottom:18}}/>
        <div style={{fontSize:13,color:"rgba(255,255,255,.8)",textAlign:"center",marginBottom:16,lineHeight:1.7,fontWeight:300,maxWidth:260}}>
          Bienvenido.<br/><span style={{color:"#FCD34D",fontWeight:700}}>¿Cómo te llamamos?</span>
        </div>
        <input autoFocus placeholder="Tu nombre, héroe…" value={nameInput}
          onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveName()}
          style={{width:"100%",maxWidth:270,textAlign:"center",fontSize:15,fontWeight:600,marginBottom:12,
            background:"rgba(255,255,255,.15)",border:`1.5px solid ${nameInput.trim()?"#FCD34D":"rgba(255,255,255,.3)"}`,
            padding:"11px 14px",borderRadius:12,color:"#fff",outline:"none"}}/>
        <button onClick={saveName} disabled={!nameInput.trim()} style={{
          background:nameInput.trim()?"linear-gradient(135deg,#F59E0B,#D97706)":"rgba(255,255,255,.1)",
          color:nameInput.trim()?"#fff":"rgba(255,255,255,.3)",
          border:"none",borderRadius:12,padding:"11px 36px",
          fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,letterSpacing:"2px",
          boxShadow:nameInput.trim()?"0 4px 14px rgba(245,158,11,.4)":"none"}}>
          COMENZAR →
        </button>
        <div style={{marginTop:14,fontSize:8,color:"rgba(255,255,255,.3)",letterSpacing:".8px",textTransform:"uppercase",textAlign:"center"}}>
          © Jorge Lami · Proyecto Héroe · Micro PowerApp ® {new Date().getFullYear()}
        </div>
      </div>
    )}
  </>);
}

const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(React.createElement(App));
  </script>
</body>
</html>
